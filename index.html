<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iSomm — Your Pocket Sommelier</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --grape:       #6B2D5E;
    --grape-dark:  #4A1D40;
    --rose:        #E8A598;
    --cork:        #C4966A;
    --linen:       #FAF6F0;
    --cream:       #F2EBE0;
    --dust:        #D9CFC4;
    --stone:       #7A6E66;
    --ink:         #2C2420;
    --good:        #4A9B6F;
    --fair:        #C4966A;
    --skip:        #C4614A;
    --good-bg:     rgba(74,155,111,0.1);
    --skip-bg:     rgba(196,97,74,0.08);
  }

  body {
    background: var(--linen);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  .hero {
    background: linear-gradient(145deg, #6B2D5E 0%, #4A1D40 60%, #2C1128 100%);
    padding: 40px 32px 36px;
    position: relative;
    overflow: hidden;
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 80% 20%, rgba(232,165,152,0.15) 0%, transparent 50%),
      radial-gradient(circle at 20% 80%, rgba(196,150,106,0.12) 0%, transparent 45%);
    pointer-events: none;
  }
  .hero-inner { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; }
  .logo-row { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
  .logo-icon {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(232,165,152,0.15);
    border: 1.5px solid rgba(232,165,152,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 34px; font-weight: 400;
    color: #FAF6F0; letter-spacing: 0.02em; line-height: 1;
  }
  .logo-text span { color: #E8A598; }
  .logo-sub {
    font-size: 10px; color: rgba(232,165,152,0.6);
    letter-spacing: 0.3em; text-transform: uppercase;
    margin-top: 4px; font-weight: 300;
  }

  /* ── Main container ── */
  .container { max-width: 720px; margin: 0 auto; padding: 36px 24px 80px; }

  /* ── API key ── */
  .api-section { margin-bottom: 28px; }
  .field-label {
    font-size: 9px; font-weight: 500; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--stone); margin-bottom: 6px;
  }
  .api-row { display: flex; gap: 8px; }
  input[type="password"], input[type="text"] {
    flex: 1; background: #fff; border: 1px solid var(--dust);
    border-radius: 8px; padding: 10px 14px; color: var(--ink);
    font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none;
  }
  input:focus { border-color: var(--grape); }
  .save-btn {
    padding: 10px 18px; background: var(--grape); border: none;
    border-radius: 8px; color: #FAF6F0; font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap;
  }
  .save-btn:hover { background: var(--grape-dark); }
  .key-status { font-size: 10px; margin-top: 5px; color: var(--stone); }
  .key-status.ok { color: var(--good); }
  .key-status.missing { color: var(--skip); }

  /* ── Tabs ── */
  .tabs {
    display: flex; border: 1px solid var(--dust); border-radius: 8px;
    overflow: hidden; width: fit-content; margin-bottom: 20px;
    background: #fff;
  }
  .tab {
    padding: 8px 20px; font-family: 'DM Sans', sans-serif; font-size: 11px;
    font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; background: transparent; border: none; color: var(--stone);
  }
  .tab.active { background: var(--grape); color: #FAF6F0; }

  /* ── Drop zone ── */
  .drop-zone {
    border: 1.5px dashed var(--dust); border-radius: 12px; padding: 40px 24px;
    text-align: center; cursor: pointer; margin-bottom: 16px;
    transition: background 0.15s, border-color 0.15s; background: #fff;
  }
  .drop-zone:hover, .drop-zone.over { background: var(--cream); border-color: var(--cork); }
  .drop-icon { font-size: 28px; margin-bottom: 10px; }
  .drop-title { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--ink); margin-bottom: 4px; }
  .drop-sub { font-size: 11px; color: var(--stone); letter-spacing: 0.04em; }
  .file-name { font-size: 11px; color: var(--good); margin-top: 8px; font-weight: 500; }

  textarea {
    width: 100%; min-height: 120px; background: #fff; border: 1px solid var(--dust);
    border-radius: 10px; padding: 14px; color: var(--ink);
    font-family: 'DM Sans', sans-serif; font-size: 13px; resize: vertical;
    margin-bottom: 16px; outline: none; line-height: 1.6;
  }
  textarea:focus { border-color: var(--grape); }
  textarea::placeholder { color: var(--dust); }

  /* ── Preferences ── */
  .section-label {
    font-size: 9px; font-weight: 500; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--stone); margin-bottom: 10px;
  }
  .prefs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
  .pref-tag {
    font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 5px 14px; border-radius: 50px; border: 1px solid var(--dust);
    color: var(--stone); cursor: pointer; background: #fff;
    transition: all 0.15s;
  }
  .pref-tag.on { background: var(--grape); color: #FAF6F0; border-color: var(--grape); }

  /* ── Analyze button ── */
  .analyze-btn {
    width: 100%; padding: 15px; font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase;
    border: none; border-radius: 10px; background: var(--grape);
    color: #FAF6F0; cursor: pointer; margin-bottom: 32px; transition: background 0.15s;
  }
  .analyze-btn:hover:not(:disabled) { background: var(--grape-dark); }
  .analyze-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── Error ── */
  .error {
    background: var(--skip-bg); border: 1px solid rgba(196,97,74,0.25);
    border-radius: 10px; padding: 14px 16px; font-size: 12px;
    color: var(--skip); margin-bottom: 20px; line-height: 1.7;
    word-break: break-word; display: none;
  }

  /* ── Loading ── */
  .loading-box { padding: 48px 0; display: none; text-align: center; }
  .spinner {
    width: 36px; height: 36px; border: 2px solid var(--dust);
    border-top-color: var(--grape); border-radius: 50%;
    animation: spin 1s linear infinite; margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-title {
    font-family: 'Playfair Display', serif; font-style: italic;
    font-size: 16px; color: var(--grape); margin-bottom: 16px;
  }
  .progress-wrap { background: var(--cream); border-radius: 50px; height: 3px; overflow: hidden; margin-bottom: 8px; }
  .progress-bar { height: 3px; border-radius: 50px; background: var(--grape); transition: width 0.4s ease; width: 0%; }
  .progress-label { font-size: 10px; color: var(--stone); letter-spacing: 0.06em; }

  /* ── Legend ── */
  .legend { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; letter-spacing: 0.06em; color: var(--stone); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend-match { margin-left: auto; display: none; align-items: center; gap: 6px; font-size: 10px; color: var(--stone); }
  .match-pill-demo {
    font-size: 9px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    background: rgba(107,45,94,0.1); color: var(--grape); border-radius: 50px; padding: 2px 8px;
  }

  /* ── Wine card ── */
  .wine-card {
    background: #fff; border: 1px solid var(--dust); border-radius: 14px;
    margin-bottom: 12px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(107,45,94,0.06);
    transition: border-color 0.3s, opacity 0.3s;
  }
  .wine-card.matched { border-color: var(--grape); }
  .wine-card.enriching { opacity: 0.6; animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.6;} 50%{opacity:0.9;} }

  .card-header {
    background: var(--grape); padding: 6px 16px;
    display: none;
  }
  .card-header.best { display: block; }
  .card-header-label {
    font-size: 9px; color: rgba(232,165,152,0.85);
    letter-spacing: 0.25em; text-transform: uppercase;
  }

  .card-body { padding: 18px 20px; display: flex; gap: 16px; align-items: flex-start; }

  .score-ring {
    flex-shrink: 0; width: 54px; height: 54px; border-radius: 50%;
    border: 2px solid; display: flex; align-items: center;
    justify-content: center; flex-direction: column;
  }
  .score-num { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 400; line-height: 1; }
  .score-lbl { font-size: 7px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--stone); margin-top: 1px; }

  .wine-body { flex: 1; min-width: 0; }
  .wine-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .wine-name { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--ink); }
  .wine-vintage { font-family: 'Playfair Display', serif; font-style: italic; font-size: 16px; color: var(--grape); }

  .live-badge {
    font-size: 9px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    background: var(--good-bg); color: var(--good); border-radius: 50px; padding: 2px 8px;
  }
  .est-badge {
    font-size: 9px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    background: var(--cream); color: var(--stone); border-radius: 50px; padding: 2px 8px;
  }
  .match-badges { display: flex; flex-wrap: wrap; gap: 4px; }
  .match-badge {
    font-size: 9px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    background: rgba(107,45,94,0.08); color: var(--grape); border-radius: 50px; padding: 2px 8px;
  }

  .wine-type-row {
    font-size: 10px; color: var(--stone); letter-spacing: 0.1em;
    text-transform: uppercase; margin-bottom: 12px;
  }

  .wine-meta-row {
    display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 14px;
    padding-bottom: 14px; border-bottom: 1px solid var(--dust);
  }
  .meta-cell { min-width: 58px; }
  .meta-lbl { font-size: 8px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--stone); margin-bottom: 3px; }
  .meta-val { font-size: 13px; font-weight: 500; color: var(--ink); }
  .meta-val.good { color: var(--good); }
  .meta-val.warn { color: var(--fair); }
  .meta-val.bad  { color: var(--skip); }
  .review-count { font-size: 10px; color: var(--stone); margin-left: 3px; font-weight: 300; }

  .wine-verdict {
    font-family: 'Playfair Display', serif; font-style: italic;
    font-size: 13px; color: var(--grape); line-height: 1.6; margin-bottom: 10px;
  }
  .pairings { display: flex; flex-wrap: wrap; gap: 5px; }
  .pairing {
    font-size: 9px; color: var(--stone); border: 1px solid var(--dust);
    border-radius: 50px; padding: 3px 10px; letter-spacing: 0.05em;
  }

  #results-box { display: none; }
</style>
</head>
<body>

<!-- Header -->
<div class="hero">
  <div class="hero-overlay"></div>
  <div class="hero-inner">
    <div class="logo-row">
      <div class="logo-icon">🍷</div>
      <div>
        <div class="logo-text">i<span>Somm</span></div>
        <div class="logo-sub">Your pocket sommelier</div>
      </div>
    </div>
  </div>
</div>

<div class="container">

  <!-- API Key -->
  <div class="api-section">
    <div class="field-label">Anthropic API Key</div>
    <div class="api-row">
      <input type="password" id="api-key" placeholder="sk-ant-..." />
      <button class="save-btn" onclick="saveKey()">Save</button>
    </div>
    <div class="key-status missing" id="key-status">No API key set</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-pdf" onclick="switchTab('pdf')">PDF Upload</button>
    <button class="tab" id="tab-text" onclick="switchTab('text')">Paste List</button>
  </div>

  <!-- PDF panel -->
  <div id="panel-pdf">
    <div class="drop-zone" id="drop-zone"
      onclick="document.getElementById('file-input').click()"
      ondragover="event.preventDefault();this.classList.add('over')"
      ondragleave="this.classList.remove('over')"
      ondrop="handleDrop(event)">
      <div class="drop-icon">📄</div>
      <div class="drop-title">Drop in a wine list and we'll find your best bottle.</div>
      <div class="drop-sub">or click to browse · PDF only</div>
      <div class="file-name" id="file-name"></div>
    </div>
    <input type="file" id="file-input" accept="application/pdf" style="display:none" onchange="handleFileInput(event)">
  </div>

  <!-- Text panel -->
  <div id="panel-text" style="display:none">
    <textarea id="wine-text" placeholder="Paste wine list text here...&#10;e.g. Opus One 2019  $280&#10;Silver Oak Cabernet 2018  $165"></textarea>
  </div>

  <!-- Preferences -->
  <div class="section-label" style="margin-top:4px">Your preferences — matched wines will be labeled</div>
  <div class="prefs" id="prefs"></div>

  <button class="analyze-btn" id="analyze-btn" onclick="analyze()" disabled>Find My Best Bottle</button>

  <div class="error" id="error-box"></div>

  <!-- Loading -->
  <div class="loading-box" id="loading-box">
    <div class="spinner"></div>
    <div class="loading-title" id="loading-title">Tasting the list...</div>
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="progress-label" id="progress-label"></div>
  </div>

  <!-- Results -->
  <div id="results-box">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#4A9B6F"></div>Excellent (90+)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7aba9a"></div>Good (80–89)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#C4966A"></div>Fair (70–79)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#C4614A"></div>Poor (&lt;70)</div>
      <div class="legend-match" id="legend-match">
        <span class="match-pill-demo">red</span> matches your preferences
      </div>
    </div>
    <div id="cards"></div>
  </div>

</div>

<script>
const PREFS = ["Red","White","Rosé","Sparkling","Bold","Light","Dry","Under $80","Best Value"];
const PREF_RULES = {
  "Red":       w => w.type === "Red",
  "White":     w => w.type === "White",
  "Rosé":      w => w.type === "Rose" || w.type === "Rosé",
  "Sparkling": w => w.type === "Sparkling",
  "Bold":      w => (w.matched_attributes||[]).includes("bold"),
  "Light":     w => (w.matched_attributes||[]).includes("light"),
  "Dry":       w => (w.matched_attributes||[]).includes("dry"),
  "Under $80": w => w.menu_price != null && w.menu_price < 80,
  "Best Value":w => w.value_score >= 80
};

// Scoring: 60% Vivino, 40% Markup
// 100% markup (2x retail) = excellent = full 40pts
// 300%+ markup = 0 markup pts
// Tiers: 90+ excellent, 80-89 good, 70-79 fair, <70 poor
function calcScore(vivino, markup) {
  const vivinoPoints = Math.min((vivino / 5) * 60, 60);
  const markupPoints = Math.min(Math.max((300 - markup) / 200, 0), 1) * 40;
  return Math.round(vivinoPoints + markupPoints);
}

function scoreColor(s) {
  if (s >= 90) return { border:"#4A9B6F", color:"#4A9B6F" };
  if (s >= 80) return { border:"#7aba9a", color:"#7aba9a" };
  if (s >= 70) return { border:"#C4966A", color:"#C4966A" };
  return { border:"#C4614A", color:"#C4614A" };
}

function markupClass(pct) {
  if (pct <= 150) return "good";
  if (pct <= 250) return "warn";
  return "bad";
}

let selectedPrefs = [];
let pdfFile = null;
let activeTab = "pdf";
let apiKey = localStorage.getItem("isomm_key") || "";

function saveKey() {
  const val = document.getElementById("api-key").value.trim();
  if (!val) return;
  apiKey = val;
  localStorage.setItem("isomm_key", val);
  document.getElementById("key-status").textContent = "API key saved";
  document.getElementById("key-status").className = "key-status ok";
  checkReady();
}

function initKey() {
  if (apiKey) {
    document.getElementById("api-key").value = apiKey;
    document.getElementById("key-status").textContent = "API key loaded";
    document.getElementById("key-status").className = "key-status ok";
  }
}

function buildPrefs() {
  const el = document.getElementById("prefs");
  PREFS.forEach(p => {
    const btn = document.createElement("button");
    btn.className = "pref-tag";
    btn.textContent = p;
    btn.onclick = () => {
      const on = selectedPrefs.includes(p);
      selectedPrefs = on ? selectedPrefs.filter(x => x !== p) : [...selectedPrefs, p];
      btn.classList.toggle("on", !on);
    };
    el.appendChild(btn);
  });
}

function switchTab(t) {
  activeTab = t;
  document.getElementById("panel-pdf").style.display  = t === "pdf" ? "block" : "none";
  document.getElementById("panel-text").style.display = t === "text" ? "block" : "none";
  document.getElementById("tab-pdf").classList.toggle("active", t === "pdf");
  document.getElementById("tab-text").classList.toggle("active", t === "text");
  checkReady();
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById("drop-zone").classList.remove("over");
  const f = e.dataTransfer.files[0];
  if (f?.type === "application/pdf") { pdfFile = f; document.getElementById("file-name").textContent = f.name; }
  else showError("Something went sideways — please upload a PDF file.");
  checkReady();
}

function handleFileInput(e) {
  const f = e.target.files[0];
  if (f) { pdfFile = f; document.getElementById("file-name").textContent = f.name; }
  checkReady();
}

function checkReady() {
  const hasKey   = !!apiKey;
  const hasInput = activeTab === "pdf" ? !!pdfFile : document.getElementById("wine-text").value.trim().length > 0;
  document.getElementById("analyze-btn").disabled = !(hasKey && hasInput);
}

document.getElementById("wine-text").addEventListener("input", checkReady);

function showError(msg) {
  const el = document.getElementById("error-box");
  el.textContent = msg;
  el.style.display = "block";
}

function setProgress(pct, label, title) {
  if (title !== undefined) document.getElementById("loading-title").textContent = title;
  document.getElementById("progress-bar").style.width = pct + "%";
  if (label !== undefined) document.getElementById("progress-label").textContent = label;
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("File read failed"));
    r.readAsDataURL(file);
  });
}

async function callClaude(messages, system, useSearch) {
  const body = { model: "claude-sonnet-4-20250514", max_tokens: 1000, messages };
  if (system)    body.system = system;
  if (useSearch) body.tools  = [{ type: "web_search_20250305", name: "web_search" }];

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  return data.content.map(b => b.text || "").filter(Boolean).join("");
}

const PARSE_PROMPT = `You are a world-class sommelier and wine value analyst. When given a restaurant wine list, extract every wine and return a JSON array sorted by best overall value score.

SCORING FORMULA — apply exactly:
  vivinoPoints = Math.min((vivino_rating / 5) * 60, 60)
  markupPoints = Math.min(Math.max((300 - markup_pct) / 200, 0), 1) * 40
  value_score  = Math.round(vivinoPoints + markupPoints)

Markup guide: 100% markup (restaurant charges 2x retail) = excellent = 40/40 pts. 300%+ = 0 pts.
Score tiers: 90+ excellent, 80-89 good, 70-79 fair, below 70 poor.

For each wine return these exact fields:
- name (string)
- vintage (string or null)
- menu_price (integer or null, no dollar sign)
- retail_price (estimated integer USD)
- markup_pct (integer — percentage ABOVE retail. 100% means 2x retail. Typical range 100-300%)
- vivino_rating (estimated float to 1 decimal, e.g. 4.2)
- value_score (integer, calculated using formula above)
- matched_attributes (array from: ["bold","light","dry","sweet","tannic","smooth","earthy","fruity"])
- verdict (string, max 20 words, no em dashes)
- pairings (array of 2-3 short food pairing strings)
- type (one of: Red, White, Rose, Sparkling, Dessert)

Respond ONLY with a valid JSON array starting with [ and ending with ]. No markdown, no preamble.`;

async function fetchVivinoRating(wine) {
  const prompt = `Search Vivino for the community rating of: "${wine.name}${wine.vintage ? " " + wine.vintage : ""}".

Return ONLY this JSON object:
{"vivino_rating": 4.2, "review_count": 12500}

- vivino_rating must be a float between 2.5 and 5.0, never null
- review_count is an integer (omit if not found)
- If exact wine not found on Vivino, estimate based on reputation
- Respond with ONLY the JSON object, nothing else`;

  try {
    const raw   = await callClaude([{ role: "user", content: prompt }], null, true);
    const match = raw.replace(/```json|```/g, "").trim().match(/\{[\s\S]*?\}/);
    if (!match) return null;
    return JSON.parse(match[0]);
  } catch { return null; }
}

async function analyze() {
  document.getElementById("error-box").style.display   = "none";
  document.getElementById("results-box").style.display = "none";
  document.getElementById("loading-box").style.display = "block";
  document.getElementById("analyze-btn").disabled = true;

  const prefStr = selectedPrefs.length ? `User preferences: ${selectedPrefs.join(", ")}.` : "";
  let wines = [];

  try {
    setProgress(5, "", "Tasting the list...");
    let messages;
    if (activeTab === "pdf") {
      const b64 = await toBase64(pdfFile);
      messages = [{ role: "user", content: [
        { type: "document", source: { type: "base64", media_type: "application/pdf", data: b64 } },
        { type: "text", text: `Analyze this restaurant wine list and return the JSON array. ${prefStr}` }
      ]}];
    } else {
      const txt = document.getElementById("wine-text").value.trim();
      messages = [{ role: "user", content: `Analyze this restaurant wine list and return the JSON array. ${prefStr}\n\n${txt}` }];
    }

    const raw   = await callClaude(messages, PARSE_PROMPT, false);
    const clean = raw.replace(/```json|```/g, "").trim();
    wines = JSON.parse(clean);

    setProgress(15, "Rendering initial results...", "List poured — fetching live ratings...");
    renderCards(wines);
    document.getElementById("results-box").style.display = "block";

    const total = wines.length;
    let done = 0;
    setProgress(15, `Looking up live Vivino ratings (0 of ${total})...`);

    const BATCH = 3;
    for (let i = 0; i < total; i += BATCH) {
      const batch = wines.slice(i, i + BATCH);
      await Promise.all(batch.map(async (wine, bi) => {
        const idx    = i + bi;
        const result = await fetchVivinoRating(wine);
        if (result && result.vivino_rating) {
          wine.vivino_rating = parseFloat(parseFloat(result.vivino_rating).toFixed(1));
          wine.review_count  = result.review_count || null;
          wine.rating_live   = true;
          wine.value_score   = calcScore(wine.vivino_rating, wine.markup_pct ?? 200);
        }
        done++;
        setProgress(15 + Math.round((done / total) * 82), `Live ratings: ${done} of ${total} wines`);
        updateCard(idx, wine);
      }));
    }

    setProgress(100, `All ${total} wines ready`, "Your best pours are ready.");
    setTimeout(() => { document.getElementById("loading-box").style.display = "none"; }, 1400);

  } catch (err) {
    document.getElementById("loading-box").style.display = "none";
    showError("Something went sideways — " + err.message);
  } finally {
    document.getElementById("analyze-btn").disabled = false;
    checkReady();
  }
}

function getMatchedPrefs(wine) {
  return selectedPrefs.filter(p => PREF_RULES[p] && PREF_RULES[p](wine));
}

function buildCardHTML(wine, isLive, idx) {
  const score     = Math.round(wine.value_score ?? 0);
  const col       = scoreColor(score);
  const markupCls = markupClass(wine.markup_pct ?? 200);
  const matched   = getMatchedPrefs(wine);
  const badges    = matched.map(p => `<span class="match-badge">${p}</span>`).join("");
  const ratingBadge = isLive
    ? `<span class="live-badge">live rating</span>`
    : `<span class="est-badge">estimated</span>`;
  const isBest = score >= 90;

  return `
    <div class="card-header${isBest ? " best" : ""}">
      <div class="card-header-label">Best Pour</div>
    </div>
    <div class="card-body">
      <div class="score-ring" style="border-color:${col.border};color:${col.color}">
        <span class="score-num">${score}</span>
        <span class="score-lbl">value</span>
      </div>
      <div class="wine-body">
        <div class="wine-name-row">
          <span class="wine-name">${wine.name}</span>
          ${wine.vintage ? `<span class="wine-vintage">${wine.vintage}</span>` : ""}
          ${ratingBadge}
          ${badges ? `<div class="match-badges">${badges}</div>` : ""}
        </div>
        ${wine.type ? `<div class="wine-type-row">${wine.type}</div>` : ""}
        <div class="wine-meta-row">
          ${wine.menu_price != null ? `<div class="meta-cell"><div class="meta-lbl">Bottle price</div><div class="meta-val">$${wine.menu_price}</div></div>` : ""}
          ${wine.retail_price ? `<div class="meta-cell"><div class="meta-lbl">Est. retail</div><div class="meta-val">$${wine.retail_price}</div></div>` : ""}
          ${wine.markup_pct != null ? `<div class="meta-cell"><div class="meta-lbl">Markup</div><div class="meta-val ${markupCls}">${wine.markup_pct}%</div></div>` : ""}
          <div class="meta-cell">
            <div class="meta-lbl">Vivino</div>
            <div class="meta-val">${wine.vivino_rating}${wine.review_count ? `<span class="review-count">(${wine.review_count.toLocaleString()})</span>` : ""}</div>
          </div>
        </div>
        <div class="wine-verdict">"${wine.verdict || ""}"</div>
        ${wine.pairings?.length ? `<div class="pairings">${wine.pairings.map(p => `<span class="pairing">${p}</span>`).join("")}</div>` : ""}
      </div>
    </div>`;
}

function renderCards(wines) {
  const container = document.getElementById("cards");
  container.innerHTML = "";
  const hasPrefs = selectedPrefs.length > 0;
  document.getElementById("legend-match").style.display = hasPrefs ? "flex" : "none";
  wines.forEach((wine, idx) => {
    const matched = getMatchedPrefs(wine);
    const card = document.createElement("div");
    card.className = "wine-card enriching" + (matched.length ? " matched" : "");
    card.id = "card-" + idx;
    card.innerHTML = buildCardHTML(wine, false, idx);
    container.appendChild(card);
  });
}

function updateCard(idx, wine) {
  const card = document.getElementById("card-" + idx);
  if (!card) return;
  const matched = getMatchedPrefs(wine);
  card.className = "wine-card" + (matched.length ? " matched" : "");
  card.innerHTML = buildCardHTML(wine, wine.rating_live || false, idx);
}

buildPrefs();
initKey();
</script>
</body>
</html>
